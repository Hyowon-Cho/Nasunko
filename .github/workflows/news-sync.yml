name: Sync market news

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: news-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger protected news sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEWS_SYNC_URL: https://nasunko.vercel.app/api/cron/news
        run: |
          test -n "$CRON_SECRET"
          curl --silent --show-error --fail-with-body \
            --retry 2 --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$NEWS_SYNC_URL"
